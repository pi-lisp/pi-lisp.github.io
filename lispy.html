<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>lispy — the uwulisp mascot</title>
<style>
  :root {
    --purple-50: #EEEDFE;
    --purple-100: #CECBF6;
    --purple-200: #AFA9EC;
    --purple-400: #7F77DD;
    --purple-600: #534AB7;
    --purple-800: #3C3489;
    --purple-900: #26215C;
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --text-primary: #1C1C1A;
    --text-secondary: #5F5E5A;
    --text-tertiary: #888780;
    --border: rgba(0,0,0,0.08);
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: "SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.7;
  }

  .container {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 1.5rem;
  }

  /* ---------- Top bar ---------- */
  .topbar {
    background: var(--purple-900);
    color: var(--purple-100);
    font-size: 13px;
    font-family: var(--font-mono);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-inner {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }

  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--purple-100);
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.01em;
    text-decoration: none;
  }

  .topbar-links {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .topbar-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    color: var(--purple-200);
    font-size: 13px;
    font-weight: 500;
    font-family: var(--font-mono);
    padding: 6px 12px;
    border-radius: var(--radius-md);
    transition: background 0.15s ease, color 0.15s ease;
  }

  .topbar-link:hover {
    background: rgba(255,255,255,0.08);
    color: #fff;
  }

  /* Hamburger */
  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 6px;
    border-radius: var(--radius-md);
    transition: background 0.15s ease;
  }

  .hamburger:hover {
    background: rgba(255,255,255,0.08);
  }

  .hamburger span {
    display: block;
    width: 20px;
    height: 2px;
    background: var(--purple-200);
    border-radius: 2px;
    transition: transform 0.2s ease, opacity 0.2s ease;
  }

  .hamburger.open span:nth-child(1) {
    transform: translateY(7px) rotate(45deg);
  }
  .hamburger.open span:nth-child(2) {
    opacity: 0;
  }
  .hamburger.open span:nth-child(3) {
    transform: translateY(-7px) rotate(-45deg);
  }

  /* Mobile drawer */
  .topbar-drawer {
    display: none;
    flex-direction: column;
    background: var(--purple-900);
    border-top: 0.5px solid rgba(255,255,255,0.08);
    padding: 0.5rem 1.5rem 1rem;
  }

  .topbar-drawer.open {
    display: flex;
  }

  .topbar-drawer .topbar-link {
    padding: 10px 12px;
    justify-content: flex-start;
    font-size: 14px;
  }

  .topbar-drawer .topbar-link.docs {
    margin-left: 0;
    margin-top: 4px;
    justify-content: center;
  }

  @media (max-width: 640px) {
    .topbar-links {
      display: none;
    }
    .hamburger {
      display: flex;
    }
  }

  /* ---------- Mascot section ---------- */
  .mascot-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 4rem 0;
  }

  .mascot-frame {
    background: var(--purple-50);
    border-radius: var(--radius-xl);
    padding: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  .mascot-frame img {
    width: 280px;
    height: 280px;
    object-fit: contain;
    display: block;
    border-radius: var(--radius-lg);
  }

  .mascot-section h1 {
    font-size: 32px;
    font-weight: 700;
    margin: 0 0 0.5rem;
    letter-spacing: -0.5px;
  }

  .mascot-section p.subtitle {
    font-size: 16px;
    color: var(--text-secondary);
    margin: 0;
  }

  /* ---------- Footer ---------- */
  footer {
    border-top: 0.5px solid var(--border);
    padding: 2rem 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    font-size: 14px;
    color: var(--text-secondary);
  }

  footer a {
    color: var(--purple-600);
    text-decoration: none;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  footer a:hover {
    color: var(--purple-800);
  }

  @media (max-width: 640px) {
    .mascot-section {
      padding: 2.5rem 0;
    }

    .mascot-frame img {
      width: 200px;
      height: 200px;
    }

    .mascot-section h1 {
      font-size: 26px;
    }
  }
</style>
</head>
<body>

<!-- Top bar -->
<header class="topbar">
  <div class="topbar-inner">
    <a class="topbar-brand" href="index.html">
      uwulisp
    </a>
    <nav class="topbar-links" aria-label="Top navigation">
      <a class="topbar-link" href="lispy.html">lispy</a>
      <a class="topbar-link" href="document.html">Docs</a>
    </nav>
    <button class="hamburger" aria-label="Toggle menu" aria-expanded="false" onclick="toggleMenu(this)">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
  <nav class="topbar-drawer" id="mobile-menu" aria-label="Mobile navigation">
    <a class="topbar-link" href="lispy.html">lispy</a>
    <a class="topbar-link" href="document.html">Docs</a>
  </nav>
</header>

<div class="container">

  <!-- Mascot -->
  <section class="mascot-section">
    <div class="mascot-frame">
      <img src="lispy.jpg" alt="lispy the uwulisp mascot — a cute purple cat wearing a bandana with a parenthesis symbol" />
    </div>
    <h1>lispy</h1>
    <p class="subtitle">the uwulisp mascot</p>
  </section>

  <!-- Footer -->
  <footer>
    <span>Written in Rust · macros, lexical scoping &amp; a cubical flavor</span>
    <a href="https://github.com/uwulisp" target="_blank" rel="noopener">
      github.com/uwulisp ↗
    </a>
  </footer>

</div>

<script>
  function toggleMenu(btn) {
    const drawer = document.getElementById('mobile-menu');
    const isOpen = drawer.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
    btn.setAttribute('aria-expanded', isOpen);
  }

  function closeMenu() {
    const drawer = document.getElementById('mobile-menu');
    const btn = document.querySelector('.hamburger');
    drawer.classList.remove('open');
    btn.classList.remove('open');
    btn.setAttribute('aria-expanded', 'false');
  }
</script>
</body>
</html>
